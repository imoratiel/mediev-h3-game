server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Redirige las llamadas a la API
    location /api {
        resolver 127.0.0.11 valid=30s;
        set $backend "backend:3000";

        proxy_pass http://$backend;

        # HTTP/1.1 con keepalive (necesario para conexiones persistentes)
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Headers estándar de proxy
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookies (JWT vía HttpOnly cookie)
        proxy_set_header Cookie $http_cookie;

        # Timeouts generosos para operaciones largas del motor de juego
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;

        # Sin buffering de respuesta para SSE / streaming futuro
        proxy_buffering off;
    }
}