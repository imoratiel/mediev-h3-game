server {
    listen 80;
    server_name localhost;

    client_max_body_size 2m;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Player avatars — served directly from shared Docker volume
    location /avatars/ {
        root /usr/share/nginx/html;
        add_header X-Content-Type-Options nosniff;
        add_header Content-Disposition inline;
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }

    # Redirige tiles al backend
    location /tiles {
        resolver 127.0.0.11 valid=30s;
        set $backend "backend:3000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # Redirige las llamadas a la API
    location /api {
        resolver 127.0.0.11 valid=30s;
        set $backend "backend:3000";

        proxy_pass http://$backend;

        # HTTP/1.1 con keepalive (necesario para conexiones persistentes)
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Headers estándar de proxy
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookies (JWT vía HttpOnly cookie)
        proxy_set_header Cookie $http_cookie;

        # Timeouts generosos para operaciones largas del motor de juego
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;

        # Sin buffering de respuesta para SSE / streaming futuro
        proxy_buffering off;
    }
}