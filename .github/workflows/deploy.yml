name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/mediev-h3

            echo "--- Pulling latest code ---"
            git pull origin main

            echo "--- Building updated images ---"
            docker compose -f docker-compose.prod.yml build --no-cache backend client

            echo "--- Restarting app containers ---"
            docker compose -f docker-compose.prod.yml up -d --no-deps backend client

            echo "--- Running pending migrations ---"
            docker compose -f docker-compose.prod.yml exec -T db sh /scripts/migrate.sh

            echo "--- Cleaning up old images ---"
            docker image prune -f

            echo "--- Deploy completed ---"
